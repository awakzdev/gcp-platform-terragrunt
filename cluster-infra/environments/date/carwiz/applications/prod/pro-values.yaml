# Default values for admin.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: registry.gitlab.com/mycompany/pro
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "master-555324bd"

imagePullSecrets:
  - name: "regcred"
nameOverride: ""
fullnameOverride: ""

GKEmanagedCertificate:
  enabled: true

gceBackendConfig:
  enabled: true
  spec:
    logging:
      enable: true
      sampleRate: 1.0
    healthCheck:
      checkIntervalSec: 30
      timeoutSec: 5
      healthyThreshold: 1
      unhealthyThreshold: 2
      type: HTTP
      requestPath: /health
      port: 80
    cdn:
      cacheMode: CACHE_ALL_STATIC
      clientTtl: 300
      defaultTtl: 300
      enabled: true
      maxTtl: 86400
      negativeCaching: true

env:
  - name: NGINX_PORT
    value: "80"

service:
  type: ClusterIP
  port: 80
  targetPort: 80
  annotations:
    cloud.google.com/neg: '{"ingress": true}'

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: gce
    # kubernetes.io/tls-acme: "true"
    networking.gke.io/v1beta1.FrontendConfig: "date-frontend-config"
  hosts:
    - host: example.com
      paths:
        - path: /*
          pathType: ImplementationSpecific
    - host: example.com
      paths:
        - path: /*
          pathType: ImplementationSpecific

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector:
  workload: application

tolerations: []

affinity: {}
