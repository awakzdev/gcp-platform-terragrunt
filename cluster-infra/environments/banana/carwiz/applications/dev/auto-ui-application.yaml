apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd-image-updater.argoproj.io/image-list: ui=registry.gitlab.com/mycompany/auto-sandbox/ui:^dev-.{8}$
    argocd-image-updater.argoproj.io/admin.pull-secret: REPLACE_ME
    argocd-image-updater.argoproj.io/admin.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/admin.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/admin.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/admin.allow-tags: regexp:^dev-.{8}$
  name: banana-auto-ui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://gitlab.com/mycompany/iac/cluster-infra.git'
    path: charts/auto-ui
    targetRevision: dev
    helm:
      valueFiles:
        - '../../environments/banana/mycompany/applications/dev/auto-ui-values.yaml'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: mycompany
  syncPolicy:
    automated: {}
