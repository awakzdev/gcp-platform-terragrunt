apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apple-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://gitlab.com/mycompany/iac/cluster-infra.git'
    path: charts/backend
    targetRevision: dev
    helm:
      valueFiles:
        - '../../environments/apple/mycompany/applications/staging/backend-values.yaml'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: mycompany
  syncPolicy:
    automated: {}
