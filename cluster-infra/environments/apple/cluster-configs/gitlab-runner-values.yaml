nodeSelector: 
  workload: builder

# This should be set from commandline on first run to create the secret for the gitlab runner
# After which if the secret already exists, it will not be updated unless forceSecretUpdate is set to true
gitlabRunnerRegistrationSecretValue: ""
forceSecretUpdate: false

dindCacheStorageSize: 250Gi

gitlab:
  rbac:
    create: true
    serviceAccountAnnotations:
      iam.gke.io/gcp-service-account: service-account@my-gcp-project-id.iam.gserviceaccount.com
  
  runners:
    name: "apple-gitlab-runner"
    tags: "apple"
    privileged: true
    secret: REPLACE_ME
    concurrent: 3
    config: |
      [[runners]]
        environment = ["DOCKER_HOST=tcp://{{.Release.Name}}-mycompany-gitlab-runner-docker-dind:2375"]
        [runners.cache]
          Type = "gcs"
          Path = "cache/"
          Shared = true
        [runners.cache.gcs]
          BucketName = "my-gcp-project-id"
        [runners.kubernetes]
          image = "ubuntu:22.04"
          namespace = "{{.Release.Namespace}}"
          privileged = true
          service_account = "gitlab-runner"
