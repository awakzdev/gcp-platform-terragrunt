# Default values for ui-next.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: registry.gitlab.com/mycompany/ui-next
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "bd289ce27247085534997a441464a8451534915d"

imagePullSecrets: 
  - name: "regcred"
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: service-account@my-gcp-project-id.iam.gserviceaccount.com
  name: "apple-ui"

env:
  - name: SCHEMA
    value: "mycompany"
  - name: PORT
    value: "3000"
  - name: GRAPHQL_SYSTEM_USER_KEY
    valueFrom:
      secretKeyRef:
        name: backend
        key: GRAPHQL_SYSTEM_USER_KEY
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: ui
        key: REDIS_HOST
  - name: REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: ui
        key: REDIS_PORT
  - name: EVENTS_BQ_TABLE
    valueFrom:
      secretKeyRef:
        name: ui
        key: EVENTS_BQ_TABLE
  - name: EVENTS_BQ_DATASET
    valueFrom:
      secretKeyRef:
        name: ui
        key: EVENTS_BQ_DATASET
  - name: MY_LOCATION_ENC_KEY
    valueFrom:
      secretKeyRef:
        name: backend
        key: MY_LOCATION_ENC_KEY        
GKEmanagedCertificate:
  enabled: true

gceBackendConfig:
  enabled: true
  spec:
    logging:
      enable: true
      sampleRate: 1.0
    cdn:
      enabled: true
      cacheMode: CACHE_ALL_STATIC
      clientTtl: 3600
      defaultTtl: 3600
      maxTtl: 86400
      negativeCaching: true
    healthCheck:
      checkIntervalSec: 30
      timeoutSec: 5
      healthyThreshold: 1
      unhealthyThreshold: 2
      type: HTTP
      requestPath: /about
      port: 3000

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations:
    cloud.google.com/backend-config: '{"default": "apple-ui-ui-next-backend-config"}'
    cloud.google.com/neg: '{"ingress": true}'

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/tls-acme: "true"
    networking.gke.io/v1beta1.FrontendConfig: "apple-frontend-config"
  hosts:
    # - host: example.com
    #   paths:
    #     - path: /*
    #       pathType: ImplementationSpecific
    #       backend:
    #         service:
    #           name: apple-ui-ui-next
    #           port:
    #             number: 80
    - host: example.com
      paths:
        - path: /*
          pathType: ImplementationSpecific
          backend:
            service:
              name: apple-ui-ui-next
              port:
                number: 80
  tls: []
  #  - secretName: REPLACE_ME
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 4Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector:
  workload: application

tolerations: []

affinity: {}
