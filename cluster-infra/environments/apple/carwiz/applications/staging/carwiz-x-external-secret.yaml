apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  annotations:
  name: externalsecret-mycompany-x
  namespace: mycompany
spec:
  dataFrom:
  - find:
      decodingStrategy: None
      tags:
        environment: apple
        my-gcp-project-id: "true"
    rewrite:
    - regexp:
        source: "APPLE_(.*)"
        target: "$1"
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-gcp-secrets
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: my-gcp-project-id
