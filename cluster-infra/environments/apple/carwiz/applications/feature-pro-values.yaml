replicaCount: 1

imagePullSecrets:
  - name: "regcred"

GKEmanagedCertificate:
  enabled: false

env:
  - name: NGINX_PORT
    value: "80"

service:
  type: ClusterIP
  port: 80
  targetPort: 80
  annotations:
    cloud.google.com/backend-config: '{"default": "apple-backend-config"}'
    cloud.google.com/neg: '{"ingress": true}'

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: le-prod
    kubernetes.io/tls-acme: "true"

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector:
  workload: application
