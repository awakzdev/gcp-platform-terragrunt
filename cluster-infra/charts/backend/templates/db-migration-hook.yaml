apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "backend.fullname" . }}-db-migrate
  labels:
    {{- include "backend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "1"
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: {{ include "backend.fullname" . }}
        release: {{ .Release.Name }}
    spec:
      activeDeadlineSeconds: 1800
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}"
        command: ["/bin/sh"]
        args: ["-c", "{{ .Values.migrations.migrateCommand }}"]
        imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
        env:
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: backend
              key: DB_ADMIN_URL
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: backend
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: backend
              key: DB_PASSWORD
