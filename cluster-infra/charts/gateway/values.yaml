# Default values for gateway.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "alpine-slim"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

gateway:
  # generateSignedUrl: https://us-central1-mycompany-mycompany.cloudfunctions.net/demo-generate_signed_url
  # baseDomain: example.com

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetport: 80
  annotations:
    # cloud.google.com/backend-config: '{"default": "apple-backend-config"}'
    # cloud.google.com/neg: '{"ingress": true}'

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: gce
    # kubernetes.io/tls-acme: "true"
    # networking.gke.io/managed-certificates: main-gw-gateway-managed-cert
    # kubernetes.io/ingress.global-static-ip-name: demo-gateway-lb-address
    # networking.gke.io/v1beta1.FrontendConfig: "gateway"

  hosts:
    # - host: example.com
    #   paths:
    #     - path: /*
    #       pathType: ImplementationSpecific
    # - host: example.com
    #   paths:
    #     - path: /*
    #       pathType: ImplementationSpecific
  tls:

GKEmanagedCertificate:
  # enabled: false

gceBackendConfig:
#   enabled: true
#   spec:
#     customResponseHeaders:
#       headers:
#       - "Access-Control-Allow-Origin:https://example.com"
#       - "Access-Control-Allow-Methods:GET, POST, OPTIONS"
#       - "Access-Control-Allow-Headers:DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
#       - "Access-Control-Expose-Headers:Content-Length,Content-Range"
#     logging:
