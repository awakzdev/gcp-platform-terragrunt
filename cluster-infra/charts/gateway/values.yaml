gceFrontendConfig:
#   enabled: true
#   spec:
#     redirectToHttps:
#       enabled: true
#     # This is required if enabled is set to true, standard is to redirect using a 301 redirect http code.
#       responseCodeName: "301"
#     # If an SSL policy is configured on the project, it can be used here, no default value exists, if unset standard GCP ssl policy will be used
#     sslPolicy: gke-ingress-ssl-policy

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
  # workload: production

tolerations: []

affinity: {}
