apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.fullname" . }}-nginx-conf
data:
  default.conf: REPLACE_ME
    server {
      listen 80;

      location /health {
        return 200 'healthy';
      }
    }
    
    server {
      listen 80;
      server_name example.com;
      client_max_body_size 5M;

      gzip_types text/plain text/css application/javascript text/xml application/xml+rss application/x-javascript application/json image/svg+xml;
      port_in_redirect off;

      location /api/data/ {
        if ($request_method = 'OPTIONS') {
          add_header 'Access-Control-Max-Age' 1728000;
          add_header 'Content-Type' 'text/plain; charset=utf-8';
          add_header 'Content-Length' 0;
          return 204;
        }

        proxy_pass http:REPLACE_ME
      }

      location / {
        proxy_set_header Host "example.com";
        proxy_intercept_errors on;
        proxy_pass http:REPLACE_ME
      }
    }

    server {
        listen       80;
        server_name example.com;
        client_max_body_size 5M;
        gzip_types text/plain text/css application/javascript text/xml application/xml+rss application/x-javascript application/json image/svg+xml;

        location /api/data/ {
          proxy_pass http:REPLACE_ME
          if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
          }
        }

        location /api/functions/signed-url {
          if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
          }
          proxy_pass {{ .Values.gateway.generateSignedUrl }};
        }

        location /api {

          proxy_pass http:REPLACE_ME
          if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
          }
        }
    }

