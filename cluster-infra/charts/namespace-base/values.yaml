# Default values for namespace-base.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: REPLACE_ME
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

environement: apple
application: db
namespace: mycompany

backendConfig:
  spec:
    logging:
      enable: true
      sampleRate: 1.0

frontendConfig:
  spec:
    redirectToHttps:
      enabled: true
      responseCodeName: "301"
    sslPolicy: apple-ssl-policy

ConfigConnectorContext:
  spec:
    googleServiceAccount: "service-account@my-gcp-project-id.iam.gserviceaccount.com"
    
buckets:
  data: 
    ORDER_VERIFICATION_BUCKET_NAME: "REPLACE_ME"
    ORDER_VERIFICATION_FOLDER_NAME: "REPLACE_ME"

functions:
  data:
    car_details: "REPLACE_ME"
    generate_user_recommendations_on_demand: "REPLACE_ME"
    fast_check_http: "REPLACE_ME"
    generate_signed_url_secured_url : "REPLACE_ME"