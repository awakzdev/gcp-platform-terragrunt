{{- if (not .Values.auth.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  admin-user-password: REPLACE_ME
  admin-user-token: REPLACE_ME
  {{- if .Values.auth.user.username }}
  user-password: REPLACE_ME
  {{- end }}
  {{- if .Values.auth.readUser.username }}
  read-user-password: REPLACE_ME
  {{- end }}
  {{- if .Values.auth.writeUser.username }}
  write-user-password: REPLACE_ME
  {{- end }}
{{- end }}
