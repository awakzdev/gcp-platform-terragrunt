extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: '{{ include "grafana.fullname" . }}-test'
    data:
      var1: "REPLACE_ME"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: '{{ include "grafana.fullname" . }}-test'
    type: Opaque
    data:
      var2: "REPLACE_ME"

sidecar:
  dashboards:
    enabled: true
    envValueFrom:
      VAR1:
        configMapKeyRef:
          name: '{{ include "grafana.fullname" . }}-test'
          key: var1
      VAR2:
        secretKeyRef:
          name: '{{ include "grafana.fullname" . }}-test'
          key: var2
  datasources:
    enabled: true
    envValueFrom:
      VAR1:
        configMapKeyRef:
          name: '{{ include "grafana.fullname" . }}-test'
          key: var1
      VAR2:
        secretKeyRef:
          name: '{{ include "grafana.fullname" . }}-test'
          key: var2
