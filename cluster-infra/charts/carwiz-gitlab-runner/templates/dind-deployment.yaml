apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "my-gcp-project-id.labels" . | nindent 4 }}
    app.kubernetes.io/name : {{ include "my-gcp-project-id.fullname" . }}-docker-dind
  name: {{ include "my-gcp-project-id.fullname" . }}-docker-dind
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "my-gcp-project-id.fullname" . }}-docker-dind
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "my-gcp-project-id.fullname" . }}-docker-dind
    spec:
      containers:
        - image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          name: docker-dind
          env:
            - name: DOCKER_HOST
              value: tcp://10.0.0.0/16:2375
            - name: DOCKER_TLS_CERTDIR #Disable TLS as traffic is not going outside of network.
              value: ""
          volumeMounts:
            - name: {{ include "my-gcp-project-id.fullname" . }}-dind-data-vol #Persisting the docker data
              mountPath: /var/lib/docker/
          ports:
            - name: daemon-port
              containerPort: {{ .Values.service.dind.targetPort }}
              protocol: TCP
          securityContext:
            privileged: true #Required for dind container to work.
      volumes:
        - name: {{ include "my-gcp-project-id.fullname" . }}-dind-data-vol
          persistentVolumeClaim:
            claimName: {{ include "my-gcp-project-id.fullname" . }}-dind-data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
